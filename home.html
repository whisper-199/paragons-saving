<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank - Home</title>
    <style>
        /* CSS to match image_1.png */
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding-bottom: 70px; /* Space for fixed bottom nav */
        }

        .container {
            padding: 20px;
        }

        /* Header section with top right wrench icon */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        /* .header-text { } */
        .welcome-tag { color: #888; font-size: 16px; margin-bottom: 5px; }
        .user-name { font-size: 28px; font-weight: bold; margin: 0; }

        .header-icon {
            background-color: #6C63FF; /* Purple from your screenshot */
            border-radius: 50%;
            padding: 10px;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Card styles used for all section blocks */
        .card {
            background-color: #1E1E1E; /* Lighter dark */
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }

        /* Total Balance Card (First main block) */
        .balance-label { color: #888; font-size: 16px; }
        .balance-amount { font-size: 40px; font-weight: bold; margin: 10px 0; }
        .account-details { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;}
        .account-num-label { color: #888; margin-bottom: 5px;}
        .account-num { font-weight: bold; color: white;}
        .status-tag { border: 1px solid #4CAF50; color: #4CAF50; border-radius: 12px; padding: 5px 12px; font-size: 14px; }

        /* Quick Actions grid */
        .section-title { margin-bottom: 15px; color: white; font-size: 18px;}
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .action-item {
            background-color: #1E1E1E;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .action-icon-wrapper { color: #FFD700; font-size: 30px; margin-bottom: 15px;}

        /* Account Info Section */
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            align-items: center;
        }
        .info-label { color: #888; }
        .info-value { font-weight: bold; color: white; }
        .value-green { color: #4CAF50; }

        /* Fixed Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #1E1E1E;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
        }
        .nav-item { text-align: center; color: #888; font-size: 12px; flex: 1; }
        .nav-item-active { color: #FFD700; }
        .nav-icon { font-size: 24px; margin-bottom: 5px; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="header-text">
                <div class="welcome-tag">Welcome back,</div>
                <h1 class="user-name">Fredfred</h1>
            </div>
            <div class="header-icon">🔧</div>
        </header>

        <div class="card">
            <div class="balance-label">Total Balance</div>
            <div class="balance-amount">$5420.50</div>

            <div class="account-details">
                <div>
                    <div class="account-num-label">Account Number</div>
                    <div class="account-num">SB841053108</div>
                </div>
                <div class="status-tag">✓ Active</div>
            </div>
        </div>

        <h2 class="section-title">Quick Actions</h2>
        <div class="actions-grid">
            <div class="action-item" onclick="sendWithdrawRequest()" style="cursor: pointer;">
    <div class="action-icon-wrapper">➤</div>
    Withdraw
</div>
        
        <div class="action-item" onclick="showStatement()" style="cursor: pointer;">
    <div class="action-icon-wrapper">📋</div>
    Statement
</div>

        </div>

        <h2 class="section-title" style="margin-top:25px;">Account Information</h2>
        <div class="card">
            <div class="info-row">
                <div class="info-label">Account Type</div>
                <div class="info-value">Savings Account</div>
            </div>
            <div class="info-row">
                <div class="info-label">Status</div>
                <div class="info-value value-green">Active</div>
            </div>
            <div class="info-row">
                <div class="info-label">Member Since</div>
                <div class="info-value">Feb 2026</div>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <div class="nav-item nav-item-active">
            <div class="nav-icon">🏠</div>
            Home
        </div>
        <div class="nav-item">
            <div class="nav-icon">📋</div>
            Transactions
        </div>
        <div class="nav-item">
            <div class="nav-icon">👤</div>
            Profile
        </div>
    </nav>

    <script>
    
    // 1. LOAD DATA FROM LOGIN
    const latestData = JSON.parse(localStorage.getItem('userData'));
    const allEntries = JSON.parse(localStorage.getItem('allEntries'));

    // 2. REDIRECT IF NO DATA
    if (!latestData) {
        window.location.href = "index.html";
    } else {
        // 3. UPDATE THE UI TEXT
        // We use innerText to replace the "Fredfred" and "$5420.50" demo text
        document.querySelector('.user-name').innerText = latestData.Name || "User";
        document.querySelector('.balance-amount').innerText = "$" + (latestData.Balance || "0.00");
        document.querySelector('.account-num').innerText = latestData.AccountNumber || "N/A";
        
        const infoValues = document.querySelectorAll('.info-value');
        if (infoValues[2]) {
            infoValues[2].innerText = latestData.MemberSince || "Unknown";
        }
    }

    // 4. WITHDRAW FUNCTION
    function sendWithdrawRequest() {
        const name = document.querySelector('.user-name').innerText;
        const balance = document.querySelector('.balance-amount').innerText;
        const phone = "256XXXXXXXXX"; // <-- PUT YOUR REAL WHATSAPP NUMBER HERE
        
        const message = `Hello, I'm ${name}. I want to withdraw ${balance} from my account.`;
        const encodedMessage = encodeURIComponent(message);
        
        window.location.href = `https://wa.me/${phone}?text=${encodedMessage}`;
    }

    // 5. STATEMENT FUNCTION
    function showStatement() {
        const modal = document.getElementById('statementModal');
        const table = document.getElementById('statementTable');
        
        if (!allEntries || allEntries.length === 0) {
            alert("No transaction history found.");
            return;
        }

        // Create Table Headers
        let tableHTML = `<tr style="background: #222;">`;
        Object.keys(allEntries[0]).forEach(header => {
            tableHTML += `<th style="border-bottom:2px solid #FFD700; padding:12px; text-align:left;">${header}</th>`;
        });
        tableHTML += `</tr>`;
        
        // Create Table Rows
        allEntries.forEach(row => {
            tableHTML += `<tr>`;
            Object.values(row).forEach(val => {
                tableHTML += `<td style="border-bottom:1px solid #333; padding:12px;">${val}</td>`;
            });
            tableHTML += `</tr>`;
        });

        table.innerHTML = tableHTML;
        modal.style.display = 'block';
    }
</script>


<div id="statementModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; overflow-y:auto; padding:20px; box-sizing:border-box;">
    <button onclick="document.getElementById('statementModal').style.display='none'" style="background:#FFD700; border:none; padding:10px; border-radius:5px; margin-bottom:20px;">Close Statement</button>
    <table id="statementTable" style="width:100%; border-collapse: collapse; color:white; font-size:14px;">
        </table>
</div>



<div id="statementModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; overflow-y:auto; padding:20px; box-sizing:border-box;">
    <button onclick="document.getElementById('statementModal').style.display='none'" style="background:#FFD700; border:none; padding:10px; border-radius:5px; margin-bottom:20px;">Close Statement</button>
    <table id="statementTable" style="width:100%; border-collapse: collapse; color:white; font-size:14px;">
        </table>
</div>

</body>
</html>
