<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParagonsSaving - Home</title>
    <style>
        /* CSS to match image_1.png */
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding-bottom: 70px; /* Space for fixed bottom nav */
        }

        .container {
            padding: 20px;
        }

        /* Header section with top right wrench icon */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        /* .header-text { } */
        .welcome-tag { color: #888; font-size: 16px; margin-bottom: 5px; }
        .user-name { font-size: 28px; font-weight: bold; margin: 0; }

        .header-icon {
            background-color: #6C63FF; /* Purple from your screenshot */
            border-radius: 50%;
            padding: 10px;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Card styles used for all section blocks */
        .card {
            background-color: #1E1E1E; /* Lighter dark */
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }

        /* Total Balance Card (First main block) */
        .balance-label { color: #888; font-size: 16px; }
        .balance-amount { font-size: 40px; font-weight: bold; margin: 10px 0; }
        .account-details { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;}
        .account-num-label { color: #888; margin-bottom: 5px;}
        .account-num { font-weight: bold; color: white;}
        .status-tag { border: 1px solid #4CAF50; color: #4CAF50; border-radius: 12px; padding: 5px 12px; font-size: 14px; }

        /* Quick Actions grid */
        .section-title { margin-bottom: 15px; color: white; font-size: 18px;}
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .action-item {
            background-color: #1E1E1E;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .action-icon-wrapper { color: #FFD700; font-size: 30px; margin-bottom: 15px;}

        /* Account Info Section */
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            align-items: center;
        }
        .info-label { color: #888; }
        .info-value { font-weight: bold; color: white; }
        .value-green { color: #4CAF50; }

        /* Fixed Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #1E1E1E;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
        }
        .nav-item { text-align: center; color: #888; font-size: 12px; flex: 1; }
        .nav-item-active { color: #FFD700; }
        .nav-icon { font-size: 24px; margin-bottom: 5px; }
      #statementModal {
    font-family: Arial, sans-serif;
    animation: fadeIn 0.3s ease;
}

#statementTable {
    background-color: #1e1e1e;
    border-radius: 12px;
    overflow: hidden;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}


    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="header-text">
                <div class="welcome-tag">Welcome back,</div>
                <h1 class="user-name">Fredfred</h1>
            </div>
            <div class="header-icon">🔧</div>
        </header>

        <div class="card">
            <div class="balance-label">Total Balance</div>
            <div class="balance-amount">Ugx5420.50</div>

            <div class="account-details">
                <div>
                    <div class="account-num-label">Account Number</div>
                    <div class="account-num">SB841053108</div>
                </div>
                <div class="status-tag">✓ Active</div>
            </div>
        </div>

        <h2 class="section-title">Quick Actions</h2>
        <div class="actions-grid">
            <div class="action-item" onclick="sendWithdrawRequest()" style="cursor: pointer;">
    <div class="action-icon-wrapper">➤</div>
    Withdraw
</div>
        
        <div class="action-item" onclick="showStatement()" style="cursor: pointer;">
    <div class="action-icon-wrapper">📋</div>
    Statement
</div>

        </div>

        <h2 class="section-title" style="margin-top:25px;">Account Information</h2>
        <div class="card">
            <div class="info-row">
                <div class="info-label">Account Type</div>
                <div class="info-value">Savings Account</div>
            </div>
            <div class="info-row">
                <div class="info-label">Status</div>
                <div class="info-value value-green">Active</div>
            </div>
            <div class="info-row">
                <div class="info-label">Latest transaction</div>
                <div class="info-value">Feb 2026</div>
            </div>
        </div>
        <div id="passwordModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; box-sizing:border-box;">
    <h2 style="color:white;">Change Password</h2>
    <input type="password" id="newPassInput" placeholder="Enter new password" style="width:100%; padding:15px; margin-bottom:10px; border-radius:8px; border:none;">
    <button onclick="updatePassword()" style="width: 100%; padding: 15px; background: #FFD700; color: black; border: none; border-radius: 12px; font-weight: bold;">Save New Password</button>
    <button onclick="document.getElementById('passwordModal').style.display='none'" style="width: 100%; padding: 10px; background: none; color: white; border: none; margin-top:10px;">Cancel</button>
</div>


    </div>

    <nav class="bottom-nav">
        <div class="nav-item nav-item-active">
            <div class="nav-icon">🏠</div>
            Home
        </div>
        <div class="nav-item">
            <div class="nav-icon">📋</div>
            Transactions
        </div>
        <div class="nav-item" onclick="logOut()" style="cursor: pointer;">
    <div class="nav-icon">👤</div>
    Log Out
</div>

        </div>
    </nav>


    
  <script>

if (!localStorage.getItem('userData')) {
    window.location.href = "index.html";
}


    const latestData = JSON.parse(localStorage.getItem('userData'));
    const allEntries = JSON.parse(localStorage.getItem('allEntries'));

    if (!latestData) {
        window.location.href = "index.html";
    } else {
        // Updates based on your specific Sheet headers
        document.querySelector('.user-name').innerText = latestData.Name || "User";
        document.querySelector('.balance-amount').innerText = "$" + (latestData.Balance || "0.00");
        
        // Use bracket notation for headers with spaces
        document.querySelector('.account-num').innerText = latestData["Account Number"] || "N/A";
        
        const infoValues = document.querySelectorAll('.info-value');
        if (infoValues[2]) {
            // Pulls the date from the latest transaction
            infoValues[2].innerText = latestData.Date || "March 2026";
        }
    }

    function sendWithdrawRequest() {
        const name = document.querySelector('.user-name').innerText;
        const balance = document.querySelector('.balance-amount').innerText;
        const phone = "256783372449";
        const message = encodeURIComponent(`Hello, I'm ${name}. I want to withdraw ${balance} from my account.`);
        window.location.href = `https://wa.me/${phone}?text=${message}`;
    }

    function showStatement() {
        const modal = document.getElementById('statementModal');
        const table = document.getElementById('statementTable');
        if (!allEntries) return alert("No transactions found.");

        let tableHTML = `<tr style="border-bottom: 2px solid #FFD700;">
            <th style="padding:10px;">Date</th>
            <th style="padding:10px;">Deposit</th>
            <th style="padding:10px;">Withdraw</th>
            <th style="padding:10px;">Balance</th>
        </tr>`;

        allEntries.forEach(row => {
            tableHTML += `<tr>
                <td style="padding:10px; border-bottom:1px solid #333;">${row.Date || ''}</td>
                <td style="padding:10px; border-bottom:1px solid #333; color:#4CAF50;">${row.Deposit || 0}</td>
                <td style="padding:10px; border-bottom:1px solid #333; color:#f44336;">${row.Withdraw || 0}</td>
                <td style="padding:10px; border-bottom:1px solid #333; font-weight:bold;">${row.Balance || 0}</td>
            </tr>`;
        });
        table.innerHTML = tableHTML;
        modal.style.display = 'block';
    }

   

function logOut() {
    // Confirm first so they don't click it by accident
    if (confirm("Are you sure you want to log out?")) {
        localStorage.clear(); // Deletes BRIAN's or FRED's data from the phone
        window.location.href = "index.html"; // Returns to the login screen
    }
}

function updatePassword() {
    const newPassword = document.getElementById('newPassInput').value;
    const userData = JSON.parse(localStorage.getItem('userData'));

    if (!newPassword) return alert("Please enter a password");

    fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
            email: userData.EMAIL || userData.Email, // Matches your sheet header
            newPassword: newPassword
        })
    })
    .then(res => res.json())
    .then(response => {
        if (response.success) {
            alert("Password updated successfully!");
            document.getElementById('passwordModal').style.display = 'none';
        } else {
            alert("Error: " + response.message);
        }
    })
    .catch(err => console.error("Update failed:", err));
}


</script>



<div id="statementModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; overflow-y:auto; padding:20px; box-sizing:border-box;">
    <button onclick="document.getElementById('statementModal').style.display='none'" style="background:#FFD700; border:none; padding:10px; border-radius:5px; margin-bottom:20px;">Close Statement</button>
    <table id="statementTable" style="width:100%; border-collapse: collapse; color:white; font-size:14px;">
        </table>
</div>



<div id="statementModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; overflow-y:auto; padding:20px; box-sizing:border-box;">
    <button onclick="document.getElementById('statementModal').style.display='none'" style="background:#FFD700; border:none; padding:10px; border-radius:5px; margin-bottom:20px;">Close Statement</button>
    <table id="statementTable" style="width:100%; border-collapse: collapse; color:white; font-size:14px;">
        </table>
</div>

</body>
</html>
