<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank - Login</title>
    <style>
        /* CSS to match image_0.png */
        body {
            background-color: #121212; /* Very dark background */
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            width: 85%;
            max-width: 400px;
            text-align: center;
        }


        /* Central Yellow Bank Icon */
       .logo-wrapper {
    margin-top: 50px;
    margin-bottom: 30px;
    display: flex;
    justify-content: center;
}

.bank-logo-img {
    width: 80px;  /* Adjust this size based on your pic */
    height: auto;
    border-radius: 15px; /* Optional: rounds the corners of your pic */
}


        h1 { font-size: 28px; margin-bottom: 5px; }
        .welcome-text { font-size: 16px; color: #888; margin-bottom: 20px; }

        /* DEMO MODE tag */
        .demo-tag {
            border: 1px solid #FFD700;
            color: #FFD700;
            border-radius: 20px;
            padding: 8px 20px;
            display: inline-block;
            margin-bottom: 40px;
            font-size: 14px;
        }

        /* Inputs and Labels */
        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label { color: #888; margin-bottom: 10px; display: block; }

        input {
            width: 100%;
            padding: 18px;
            background-color: #1E1E1E; /* Slightly lighter dark */
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box; /* Crucial for padding */
        }

        ::placeholder { color: #555; }

        /* Sign In Button */
        .signin-btn {
            width: 100%;
            padding: 18px;
            background-color: #FFD700; /* Main Yellow */
            color: black;
            font-weight: bold;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .signin-btn:hover { opacity: 0.8; }

        /* Bottom Signup Link */
        .signup-text { margin-top: 30px; color: #888; }
        .signup-link { color: #FFD700; text-decoration: none; font-weight: bold; }

    </style>
</head>
<body>

    <div class="login-container">

      <div class="logo-wrapper">
    <img src="logo.png" alt="SecureBank Logo" class="bank-logo-img">
</div>


        <h1>Paragons-Savings</h1>
        <div class="welcome-text">Welcome back</div>

        <div class="demo-tag">ⓘ DEMO MODE</div>

        <div class="input-group">
            <label for="emailInput">Email</label>
            <input type="email" id="emailInput" placeholder="you@example.com" required>
        </div>

        <div class="input-group">
            <label for="passwordInput">Password</label>
            <input type="password" id="passwordInput" placeholder="Enter password" required>
        </div>

        <button class="signin-btn" id="signInButton">Sign In</button>

        <div class="signup-text">Don't have an account? <a href="#" class="signup-link">Sign Up</a></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwwcb1l8PVBeDkJYa51OX4geRgor4WneQYCFaOrGH5U77hfYDuxkM1IfRyp48xmdMFM/exec";

    document.getElementById('signInButton').addEventListener('click', function() {
    const email = document.getElementById('emailInput').value.trim();
    const btn = this;
    const password = document.getElementById('passwordInput').value.trim();

// Update the URL to include &password=
fetch(`${SCRIPT_URL}?email=${email}&password=${password}`)
    .then(res => res.json())
    .then(response => {
        if (response.success) {
            localStorage.setItem('userData', JSON.stringify(response.latest));
            localStorage.setItem('allEntries', JSON.stringify(response.allEntries));
            window.location.href = "home.html";
        } else {
            // Now shows "Incorrect password" or "Email not found"
            alert(response.message || "Login failed");
            btn.innerText = "Sign In";
            btn.disabled = false;
        }
    })



    if (!email) return alert("Please enter your email");

    btn.innerText = "Verifying...";
    btn.disabled = true;

    
        })
        .catch(err => {
            console.error(err);
            alert("Connection error. Check your internet.");
            btn.innerText = "Sign In";
            btn.disabled = false;
        });





    fetch(`${SCRIPT_URL}?email=${email}`, {
    method: 'GET',
    mode: 'cors', // Add this
    redirect: 'follow' //ensure it follows Google's redirect
})

    </script>

</body>
</html>
